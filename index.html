<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pearl</title>
    <script>
      (function () {
        try {
          var config = {
            light: { domTheme: 'light', template: null },
            dark: { domTheme: 'dark', template: null },
            brown: { domTheme: 'dark', template: 'brown' },
            plant: { domTheme: 'light', template: 'plant' },
            blossom: { domTheme: 'light', template: 'blossom' },
          }
          var stored = localStorage.getItem('theme')
          var theme = config[stored]
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light'
          var current = config[theme]
          document.documentElement.setAttribute('data-theme', current.domTheme)
          if (current.template) document.documentElement.setAttribute('data-template', current.template)
          document.documentElement.style.colorScheme = current.domTheme
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
